  #        run: mvn verify -Pintegration-tests # Adjust this command if your integration tests are run differently (e.g., 'mvn integration-test')


  # ================================
  # Docker Build Job
  # ================================
  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: [lint-test, integration-test]

    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target

      - name: Download TAG Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-tag

      - name: test the tag artifact
        run: |
          echo "NEW_TAG=$(cat new_tag.txt)" >> $GITHUB_ENV
          echo "======================"
          cat new_tag.txt
          echo "======================"

      - name: Verify artifact
        run: |
          ls -lah
          ls -lah target

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PAT }}

      - name: Build docker image
        working-directory: .
        run: |
            docker build -t ${{ env.IMAGE_NAME }}:${{ env.NEW_TAG }} -t ${{ env.IMAGE_NAME }}:latest .

      - name: Verify Docker Image
        run: |
          docker images 

      - name: Push docker image
        run: |
            docker push ${{ env.IMAGE_NAME }}:${{ env.NEW_TAG }}
            docker push ${{ env.IMAGE_NAME }}:latest
        
        

