name: CI/CD Workflow

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  merge_group:
    types: [ checks_requested ]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true
  MAVEN_OPTS: '-Xmx1024m'
  ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  APP_NAME: 'paymetv-app'
  IMAGE_NAME: 'paymetv/paymetv-app'

jobs:
  # ================================
  # App Build Job
  # ================================
  build-app:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.image_tag.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Generate IMAGE_TAG
        id: image_tag
        run: echo "image_tag=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Print image values
        run: |
          echo "IMAGE_TAG is ${{ steps.image_tag.outputs.image_tag }}"
          echo "IMAGE_NAME is $IMAGE_NAME"
          echo "FULL IMAGE is $IMAGE_NAME:${{ steps.image_tag.outputs.image_tag }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/main/resources/frontend/package-lock.json

      - name: Build Frontend
        working-directory: src/main/resources/frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend with Maven
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      - name: save the new tag id
        run: echo ${{ steps.image_tag.outputs.image_tag }} > new_tag.txt

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/paymetv-app-0.0.1-SNAPSHOT.jar

      - name: Upload TAG Artifact
        id: tag-upload-step
        uses: actions/upload-artifact@v4
        with:
          name: app-tag
          path: new_tag.txt


  # ================================
  # Test Build Jobb
  # ================================
  lint-test:
    runs-on: ubuntu-latest
    needs: build-app # This job runs after the maven_build job
    steps:
      - name: print simple message
        run: echo "Lint tests would run here. This is a placeholder step."
  #      - name: Checkout code
  #        uses: actions/checkout@v5
  #
  #      - name: Setup Node.js for linting
  #        uses: actions/setup-node@v5
  #        with:
  #          node-version: '18' # Ensure Node.js is available for linting tools
  #
  #      - name: Install Node.js dependencies for linting
  #        run: npm ci
  #
  #      - name: Run lint tests
  #        run: npm run lint # Adjust this command if your linting script is different

  # ================================
  # Integration Build Job
  # ================================
  integration-test:
    runs-on: ubuntu-latest
    needs: build-app # This job runs after the maven_build job, in parallel with lint_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run DatabaseHealthCheck
        run: |
          echo "Running Database health checker."
          ./mvnw test '-Dtest=com.paymetv.util.integration.*Test' test
  #      - name: Checkout code
  #        uses: actions/checkout@v5
  #
  #      - name: Set up JDK 17 for integration tests
  #        uses: actions/setup-java@v5
  #        with:
  #          java-version: '17'
  #          distribution: 'corretto'
  #          cache: 'maven'
  #
  #      - name: Download Maven artifact for tests (if needed)
  #        uses: actions/download-artifact@v4
  #        with:
  #          name: maven-app-artifact
  #          path: ./maven-app-dist
  #
  #      - name: Run integration tests
  #        run: mvn verify -Pintegration-tests # Adjust this command if your integration tests are run differently (e.g., 'mvn integration-test')


  # ================================
  # Docker Build Job
  # ================================
  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: [ lint-test, integration-test ]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target

      - name: Download TAG Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-tag

      - name: Set NEW_TAG
        run: echo "NEW_TAG=$(cat new_tag.txt)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.NEW_TAG }}
            ${{ env.IMAGE_NAME }}:latest
