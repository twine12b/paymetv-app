name: CI/CD Pipeline shape

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  node_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # You can change this to your desired Node.js version

      - name: Install Node.js dependencies
        run: npm ci # Use 'npm install' if you don't use a lock file

      - name: Build Node.js application
        run: npm run build # Adjust this command if your build script is different

      - name: Upload Node.js artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app-artifact
          path: build/ # Adjust this path to where your Node.js build output is located

  maven_build:
    runs-on: ubuntu-latest
    needs: node_build # This job depends on the node_build job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Node.js artifact (if needed by Maven build)
        uses: actions/download-artifact@v4
        with:
          name: node-app-artifact
          path: ./node-app-dist # Downloads the Node.js artifact to this path

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto' # You can choose 'temurin', 'adopt', etc.
          cache: 'maven'

      - name: Build Maven application
        run: mvn clean install -DskipTests # Builds the Maven project, skipping tests to run them in separate jobs

      - name: Upload Maven artifact
        uses: actions/upload-artifact@v4
        with:
          name: maven-app-artifact
          path: target/*.jar # Adjust this path to where your Maven JARs are located

  lint_test:
    runs-on: ubuntu-latest
    needs: maven_build # This job runs after the maven_build job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js for linting
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Ensure Node.js is available for linting tools

      - name: Install Node.js dependencies for linting
        run: npm ci

      - name: Run lint tests
        run: npm run lint # Adjust this command if your linting script is different

  integration_test:
    runs-on: ubuntu-latest
    needs: maven_build # This job runs after the maven_build job, in parallel with lint_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 for integration tests
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      - name: Download Maven artifact for tests (if needed)
        uses: actions/download-artifact@v4
        with:
          name: maven-app-artifact
          path: ./maven-app-dist

      - name: Run integration tests
        run: mvn verify -Pintegration-tests # Adjust this command if your integration tests are run differently (e.g., 'mvn integration-test')

  docker_build_push:
    runs-on: ubuntu-latest
    needs: [lint_test, integration_test] # This job runs only after both test jobs have completed successfully
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only runs on push to the main branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: generate_tag
        run: echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # Assumes Dockerfile is in the root of the repository
          push: true
          tags: your-dockerhub-username/your-repo-name:${{ steps.generate_tag.outputs.IMAGE_TAG }}
