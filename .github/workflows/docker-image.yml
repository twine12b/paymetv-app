name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Workflow permissions
permissions:
  contents: read
  packages: read
  actions: read
  checks: write
  pull-requests: write

# Prevent concurrent builds on the same ref
concurrency:
  group: paymetv-${{ github.ref }}
  cancel-in-progress: true

# Global environment variables
env:
  JAVA_VERSION: '17'
  NODE_VERSION: '24'
  MAVEN_OPTS: '-Xmx1024m'
  ACTIONS_RUNTIME_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
  APP_NAME: 'paymetv-app'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NVD_API_KEY: '${{ secrets.OWASP_NVD_API_KEY }}'


jobs:
  # ================================
  # Frontend Build Job
  # ================================
  node_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # You can change this to your desired Node.js version

      - name: Install Node.js dependencies
        working-directory: src/main/resources/frontend
        run: npm ci --force # Use 'npm install' if you don't use a lock file

      - name: Build Node.js application
        working-directory: src/main/resources/frontend
        run: npm run build # Adjust this command if your build script is different

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: |
            dist
            package.json
            package-lock.json

  # ================================
  # FBackend Build Job
  # ================================
  backend-build-test:
    name: Build & Test Spring Boot Backend
    runs-on: ubuntu-latest
    needs: node-build
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      #
      # Download the frontend artifact created by another workflow/job
      #
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-app
          path: src/main/resources/static
      
      #
      # Setup Java 17
      #
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      
      #
      # Build Spring Boot application with Maven
      #
      - name: Build application
        run: mvn clean package -DskipTests
      
      #
      # Upload the Spring Boot jar as an artifact
      #
      - name: Upload Spring Boot artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.jar
