name: CI/CD Workflow

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'
  MAVEN_OPTS: '-Xmx1024m'
#  ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  APP_NAME: 'paymetv-app'
  IMAGE_NAME: 'paymetv/paymetv-app'

jobs:
  build-app:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image_tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v5

      - id: image_tag
        name: Generate IMAGE_TAG
        run: echo "image_tag=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Print image values
        run: |
          echo "IMAGE_TAG=${{ steps.image_tag.outputs.image_tag }}"
          echo "IMAGE_NAME=$IMAGE_NAME"

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/main/resources/frontend/package-lock.json

      - name: Build Frontend
        working-directory: src/main/resources/frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build Backend
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      - uses: actions/upload-artifact@v5
        if: ${{ !env.ACT }}
        with:
          name: app-jar
          path: target/paymetv-app-0.0.1-SNAPSHOT.jar
          compression-level: 0

  lint-test:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - run: echo "Lint placeholder"

  integration-test:
    runs-on: ubuntu-latest
    needs: build-app
    env:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Run integration tests
        run: |
          chmod +x ./mvnw
          ./mvnw -Dtest='com.paymetv.util.integration.*Test' test

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: [build-app, lint-test, integration-test]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: app-jar
          path: target

      - uses: docker/setup-buildx-action@v3
        with:
          install: true

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.build-app.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest
