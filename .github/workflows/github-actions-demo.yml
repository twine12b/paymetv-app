name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]

# Workflow permissions
permissions:
  contents: read
  packages: read
  actions: read
  checks: write
  pull-requests: write

# Prevent concurrent builds on the same ref
concurrency:
  group: paymetv-${{ github.ref }}
  cancel-in-progress: true

# Global environment variables
env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  MAVEN_OPTS: '-Xmx1024m'
  ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ================================
  # Frontend Build Job
  # ================================
  frontend-build:
    name: Build Frontend (React + Tailwind + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git authentication
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/main/resources/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/main/resources/frontend
        run: npm install

      - name: Build frontend
        working-directory: src/main/resources/frontend
        run: npm run build

      - name: Verify frontend build output
        run: |
          echo "📦 Checking frontend build output..."
          ls -la src/main/resources/static/ || true
          echo ""
          echo "Verifying critical files:"
          test -f src/main/resources/static/index.html && echo "✅ index.html exists" || echo "❌ index.html missing"
          test -f src/main/resources/static/login.html && echo "✅ login.html exists" || echo "❌ login.html missing"
          test -d src/main/resources/static/assets && echo "✅ assets directory exists" || echo "❌ assets directory missing"
          echo ""
          echo "Assets contents:"
          ls -lh src/main/resources/static/assets/ | head -10 || true

  # ================================
  # Backend Build & Test Job
  # ================================
  backend-build-test:
    name: Build & Test Spring Boot Backend
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

#      - name: Download frontend artifacts
#        uses: actions/download-artifact@v4
#        with:
#          name: frontend-build
#          path: src/main/resources/static/

      - name: Set up JDK 17 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Install Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests with Maven wrapper (includes FileUploadControllerTest & ImageFaceControllerTest)
        run: mvn -B clean test

      - name: Verify test results
        run: |
          echo "📊 Checking test results..."
          if [ -f target/surefire-reports/TEST-*.xml ]; then
            echo "✅ Test reports generated"
            echo ""
            echo "Test Summary:"
            grep -r "tests=" target/surefire-reports/TEST-*.xml | head -10
          else
            echo "⚠️ No test reports found"
          fi

      - name: Package application (skip tests - already ran)
        run: mvn -B package -DskipTests

      - name: Verify JAR creation
        run: |
          echo "📦 Checking for generated JAR..."
          ls -lh target/*.jar
          JAR_FILE=$(ls target/*.jar | head -1)
          echo "✅ JAR file: $JAR_FILE"
          echo "JAR size: $(du -h $JAR_FILE | cut -f1)"


