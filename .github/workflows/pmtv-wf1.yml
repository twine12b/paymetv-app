name: CI/CD Workflow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '24'
  MAVEN_OPTS: '-Xmx1024m'
  ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  APP_NAME: 'paymetv-app'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE_24: true
  IMAGE_NAME: 'paymetv/paymetv-app'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Generate timestamp IMAGE_TAG
      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      # Optional debug
      - name: Print image values
        run: |
          echo "IMAGE_TAG is $IMAGE_TAG"
          echo "IMAGE_NAME is $IMAGE_NAME"
          echo "FULL IMAGE is $IMAGE_NAME:$IMAGE_TAG"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/main/resources/frontend/package-lock.json

      - name: Build Frontend
        working-directory: src/main/resources/frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend with Maven
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      - name: Build and Push Docker Image
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ env.IMAGE_TAG }},latest
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
