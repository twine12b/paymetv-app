<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PayMeTV</title>
    <!-- Tailwind CSS via CDN for standalone login page -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex justify-center items-center">

<div class="bg-white shadow-lg rounded-lg p-8 w-96">
    <h2 class="text-2xl font-bold text-center mb-6">Login to PayMeTV</h2>

    <!-- Error Message -->
    <div id="error-message" class="hidden mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm">
        Invalid username or password. Please try again.
    </div>

    <!-- Success Message -->
    <div id="success-message" class="hidden mb-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm">
        You have been successfully logged out.
    </div>

    
    <form action="/login" method="POST" id="login-form">
        <!-- CSRF Token (required for Spring Security) - populated by JavaScript -->
        <input type="hidden" id="csrf-token" name="_csrf" value="">

        <!-- Username -->
        <div class="mb-4">
            <label for="username" class="block text-sm font-semibold text-gray-700">Username</label>
            <input type="text" id="username" name="username" required class="w-full mt-2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <!-- Password -->
        <div class="mb-6">
            <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
            <input type="password" id="password" name="password" required class="w-full mt-2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <!-- Remember Me -->
        <div class="mb-4">
            <label class="flex items-center">
                <input type="checkbox" id="remember-me" name="remember-me" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                <span class="ml-2 text-sm text-gray-700">Remember me for 7 days</span>
            </label>
        </div>

        <!-- Submit Button -->
        <div class="flex justify-between items-center">
            <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">Login</button>
        </div>
    </form>

    <!-- Links -->
    <div class="mt-4 text-center">
        <p class="text-sm text-gray-600">
            <a href="/" class="text-indigo-600 hover:text-indigo-700 font-medium">← Back to Home</a>
        </p>
        <p class="text-xs text-gray-500 mt-2">
            Default credentials: user/user or admin/admin
        </p>
    </div>
</div>

<script>
    /**
     * Extract CSRF token from cookie (Spring Security's CookieCsrfTokenRepository)
     * The token is stored in the XSRF-TOKEN cookie when using CookieCsrfTokenRepository.withHttpOnlyFalse()
     */
    function getCsrfToken() {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            const [name, value] = cookie.trim().split('=');
            if (name === 'XSRF-TOKEN') {
                return decodeURIComponent(value);
            }
        }
        return null;
    }

    /**
     * Update the CSRF token in the form
     * This function is called on page load and before form submission
     */
    function updateCsrfToken() {
        const csrfToken = getCsrfToken();
        const csrfInput = document.getElementById('csrf-token');

        if (csrfToken && csrfInput) {
            csrfInput.value = csrfToken;
            console.log('✅ CSRF token updated successfully');
            return true;
        } else if (!csrfToken) {
            console.error('❌ CSRF token not found in cookies. Spring Security should set XSRF-TOKEN cookie.');
            console.log('Available cookies:', document.cookie);
            return false;
        }
        return false;
    }

    // Inject CSRF token on page load
    document.addEventListener('DOMContentLoaded', function() {
        // Initial token injection
        updateCsrfToken();

        // Add form submit handler to ensure token is fresh
        const loginForm = document.getElementById('login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', function(event) {
                // Update token one more time before submission
                const tokenUpdated = updateCsrfToken();

                if (!tokenUpdated) {
                    // If no token available, show warning but allow submission
                    // (Spring Security will handle the rejection)
                    console.warn('⚠️ Submitting form without CSRF token. This may fail.');
                }

                // Log form data for debugging
                const formData = new FormData(loginForm);
                console.log('Form submission data:');
                for (let [key, value] of formData.entries()) {
                    if (key === '_csrf') {
                        console.log(`  ${key}: ${value.substring(0, 20)}...`);
                    } else if (key === 'password') {
                        console.log(`  ${key}: ********`);
                    } else {
                        console.log(`  ${key}: ${value}`);
                    }
                }
            });
        }
    });

    // Show error message if ?error=true
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error')) {
        document.getElementById('error-message').classList.remove('hidden');
        console.error('Login failed: Invalid credentials or CSRF token issue');
    }
    if (urlParams.get('logout')) {
        document.getElementById('success-message').classList.remove('hidden');
        console.log('Logged out successfully');
    }
</script>

</body>
</html>
