# Local Development Profile - application-local.properties
# This profile is used when running the application locally with: 
#   mvn clean spring-boot:run -Dspring-boot.run.arguments=--spring.profiles.active=local

# Server Configuration
server.port=8090
server.servlet.context-path=/

# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.readinessState.enabled=true
management.endpoint.health.show-details=always
management.health.probes.enabled=true
management.health.livenessState.enabled=true
management.endpoints.web.base-path=/actuator
management.health.db.enabled=true
management.health.diskspace.enabled=true

# MySQL Database Configuration - LOCAL
# Uses localhost for local development (assumes MySQL is running on localhost:3306)
spring.datasource.url=jdbc:mysql://localhost:3306/paymetv_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Ch1ldren
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=src/main/resources/database/schema.sql
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-source=metadata

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# Kafka Configuration - LOCAL
# Uses localhost for local development (assumes Kafka is running on localhost:9092)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=pmtv-test-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Client ID
spring.kafka.client-id=pmtv-test-client

# Kafka Retry Configuration
spring.kafka.producer.retries=8
spring.kafka.producer.properties.retry.backoff.ms=100

# Disable auto topic creation for local development
spring.kafka.admin.properties.bootstrap.servers=localhost:9092
# Disable automatic topic creation
spring.kafka.admin.auto-create=false

spring.cloud.refresh.enabled=false
spring.autoconfigure.exclude=org.springframework.cloud.autoconfigure.ConfigurationPropertiesRebinderAutoConfiguration

# Allow bean definition overriding
spring.main.allow-bean-definition-overriding=true

# Kafka Topics Configuration
app.kafka.topics=topic-file-upload,topic-image-face,generic-producer-test,test-topic1,test-topic2,test-topic3
