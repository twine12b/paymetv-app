# Server Configuration
server.port=8090
server.servlet.context-path=/

# MySQL Database Configuration
# Connection URL - uses mysql-service as hostname (Kubernetes service name)
#spring.datasource.url=jdbc:mysql://mysql-service:3306/paymetv_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306
spring.datasource.username=root
spring.datasource.password=Ch1ldren
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Connection Pool Configuration (HikariCP - default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# Kafka Configuration
# For pmtv-test.js replication, use broker-2 at 127.0.0.1:9093
#spring.kafka.bootstrap-servers=127.0.0.1:9093
#spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
#spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
#spring.kafka.consumer.group-id=pmtv-test-group
#spring.kafka.consumer.auto-offset-reset=earliest
#spring.kafka.consumer.enable-auto-commit=true
#spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Client ID (matches pmtv-test.js)
spring.kafka.client-id=pmtv-test-client

# Kafka Retry Configuration
spring.kafka.producer.retries=8
spring.kafka.producer.properties.retry.backoff.ms=100

#javax.persistence.schema-generation.scripts.action=drop-and-create
#javax.persistence.schema-generation.scripts.create-target=src/main/resources/database/schema.sql
#jakarta.persistence.schema-generation.create-source=metadata
#jakarta.persistence.schema-generation.drop-source=metadata

spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=src/main/resources/database/schema.sql
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-source=metadata

spring.cloud.refresh.enabled=false
spring.autoconfigure.exclude=org.springframework.cloud.autoconfigure.ConfigurationPropertiesRebinderAutoConfiguration